<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>国名スプリントシャウト・ソルバー</title>
<style>
body { font-family: sans-serif; padding: 20px; }
input { font-size: 20px; width: 300px; }
button { font-size: 18px; }
pre { background: #f0f0f0; padding: 10px; }
</style>
</head>
<body>

<h2>国名スプリントシャウト・ソルバー</h2>

<input id="pattern" placeholder="例：〇メ〇〇 / 1〇1〇">
<label><input type="checkbox" id="shiritori"> しりとりモード</label>
<button onclick="runSolve()">解く</button>

<pre id="result"></pre>

<script src="dictionary.js"></script>

<script>
// ===============================
// ひらがな → カタカナ
// ===============================
function hiraToKata(str) {
    return str.replace(/[\u3041-\u3096]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) + 0x60)
    );
}

// ===============================
// 半角カナ → 全角カナ
// ===============================
function hankanaToZenkana(str) {
    return str.replace(/[\uff61-\uff9f]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) + 0x60)
    );
}

// ===============================
// 入力正規化
// ===============================
function normalizeInput(str) {
    str = hankanaToZenkana(str);
    str = hiraToKata(str);
    return str;
}

// ===============================
// パターン一致判定
// ===============================
function matchPattern(pattern, word) {
    if (pattern.length !== word.length) return false;

    const mapNumToChar = {};
    const usedChars = {};

    for (let i = 0; i < pattern.length; i++) {
        const p = pattern[i];
        const w = word[i];

        if (p === "〇") continue;

        if (/[0-9]/.test(p)) {
            if (!mapNumToChar[p]) {
                if (usedChars[w] && usedChars[w] !== p) return false;
                mapNumToChar[p] = w;
                usedChars[w] = p;
            } else {
                if (mapNumToChar[p] !== w) return false;
            }
        } else {
            if (p !== w) return false;
        }
    }
    return true;
}

// ===============================
// しりとり連結生成
// ===============================
function generateShiritoriChains(list, maxLength = 3) {
    const results = [];

    function dfs(chain, lastChar) {
        if (chain.length >= maxLength) return;

        for (const c of list) {
            if (lastChar && !c.startsWith(lastChar)) continue;

            const newChain = [...chain, c];
            results.push(newChain);

            dfs(newChain, c[c.length - 1]);
        }
    }

    for (const c of list) {
        dfs([c], c[c.length - 1]);
    }

    return results;
}

// ===============================
// ランダム連結（しりとりOFF用）
// ===============================
function generateRandomChains(list, maxLength = 3) {
    const results = [];

    for (const a of list) {
        results.push([a]);
        for (const b of list) {
            results.push([a, b]);
            for (const c of list) {
                results.push([a, b, c]);
            }
        }
    }
    return results;
}

// ===============================
// ソルバー本体
// ===============================
function solvePattern(inputPattern, shiritoriMode = false) {
    const pattern = normalizeInput(inputPattern);

    const list = [...window.DICT.country, ...window.DICT.capital];

    let candidates = [];

    if (shiritoriMode) {
        const chains = generateShiritoriChains(list, 4);
        for (const chain of chains) {
            const joined = chain.join("");
            if (joined.length === pattern.length && matchPattern(pattern, joined)) {
                candidates.push(chain);
            }
        }
    } else {
        const chains = generateRandomChains(list, 3);
        for (const chain of chains) {
            const joined = chain.join("");
            if (joined.length === pattern.length && matchPattern(pattern, joined)) {
                candidates.push(chain);
            }
        }
    }

    return candidates;
}

// ===============================
// UI
// ===============================
function runSolve() {
    const p = document.getElementById("pattern").value;
    const s = document.getElementById("shiritori").checked;

    const res = solvePattern(p, s);

    if (res.length === 0) {
        document.getElementById("result").textContent = "一致なし";
        return;
    }

    let out = "";
    for (const chain of res) {
        out += chain.join(" → ") + "\n";
    }
    document.getElementById("result").textContent = out;
}
</script>

</body>
</html>
